{% extends "base.html" %}
{% block title %}Admin — Acceso{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card p-4">
      <h5 class="fw-bold mb-4 text-center" style="color:var(--brand);">Panel Administrativo</h5>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-control" autofocus required>
        </div>
        <button type="submit" class="btn btn-brand w-100">Ingresar</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
