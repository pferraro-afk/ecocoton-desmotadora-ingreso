<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ingreso Planta Desmotadora{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand:       #2e2e8f;
      --brand-mid:   #4b4bc8;
      --brand-light: #7b7be0;
      --bg:          #f5f5fb;
    }

    * { font-family: 'Inter', sans-serif; }
    body { background: var(--bg); }

    /* navbar */
    .navbar {
      background: #fff !important;
      padding: 10px 0;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .navbar-brand img { height: 48px; width: auto; }
    .navbar-subtitle {
      font-size: .78rem; font-weight: 600; letter-spacing: .5px;
      color: #6b7280; text-transform: uppercase; margin-left: 12px;
      border-left: 1.5px solid #d1d5db; padding-left: 12px;
      line-height: 1.2;
    }

    /* cards */
    .card {
      border: none;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }

    /* form controls */
    .form-control, .form-select {
      border-radius: 8px;
      border: 1.5px solid #d1d5db;
      padding: 10px 14px;
      transition: border-color .2s;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--brand-mid);
      box-shadow: 0 0 0 3px rgba(45,106,79,.15);
    }
    .form-label { font-weight: 500; font-size: .9rem; color: #374151; margin-bottom: 5px; }

    /* buttons */
    .btn-brand {
      background: var(--brand-mid); color: #fff;
      border: none; border-radius: 8px;
      padding: 11px 20px; font-weight: 600;
      transition: background .2s;
    }
    .btn-brand:hover { background: var(--brand); color: #fff; }
    .btn-primary { background: var(--brand-mid); border-color: var(--brand-mid); border-radius: 8px; font-weight: 600; }
    .btn-primary:hover { background: var(--brand); border-color: var(--brand); }
    .btn-success { border-radius: 8px; font-weight: 600; }
    .btn-dark { border-radius: 8px; font-weight: 600; }
    .btn-outline-secondary { border-radius: 8px; }

    /* section titles */
    .section-title {
      font-size: .75rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: #6b7280;
      border-bottom: 1.5px solid #e5e7eb;
      padding-bottom: 8px; margin-bottom: 20px; margin-top: 8px;
    }

    /* subcard for empleados/vehiculos */
    .sub-card {
      background: #f9fafb;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container d-flex align-items-center">
      <a class="navbar-brand p-0" href="/">
        <img src="/static/logo.png" alt="Ecocoton">
      </a>
      <span class="navbar-subtitle">Planta<br>Desmotadora</span>
    </div>
  </nav>

  <div class="container py-4">
    {% with msgs = get_flashed_messages() %}
      {% if msgs %}
        {% for m in msgs %}
          <div class="alert alert-danger alert-dismissible fade show rounded-3 mb-3">
            {{ m }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
