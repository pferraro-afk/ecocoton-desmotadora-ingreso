{% extends "base.html" %}
{% block title %}Acceso Portero{% endblock %}
{% block content %}
<div class="row justify-content-center" style="margin-top: 80px;">
  <div class="col-md-4">
    <div class="card p-4">
      <div class="text-center mb-4">
        <div style="font-size:2.5rem;">🔒</div>
        <h5 class="fw-bold mt-2 mb-0" style="color:#1b4332;">Portal Portero</h5>
        <p class="text-muted small mt-1">Ingresá la contraseña para acceder</p>
      </div>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-control form-control-lg"
                 autofocus required>
        </div>
        <button type="submit" class="btn btn-dark w-100" style="padding:12px; font-size:1rem;">
          Ingresar
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
